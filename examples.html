<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoChecklist</title>
  <meta name="description" content="An open-source library that unifies LLM-based checklist evaluation into composable pipelines.">
  <link rel="icon" type="image/png" href="assets/ac_bg_dark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="examples.css">
</head>
<body>

  <div id="nav"></div>

  <!-- Examples Content -->
  <section class="examples-content">
    <div class="container">
      <h1 class="examples-hero-title">Checklist Evaluation Examples</h1>
      <p class="examples-hero-desc">From <a href="https://huggingface.co/datasets/allenai/WildBench/viewer/v2">WildBench v2</a></p>
      <!-- Tab bar (JS populates) -->
      <div class="example-tabs" id="example-tabs"></div>

      <!-- Example display -->
      <div id="example-display">
        <div class="example-input-solo" id="example-input-solo"></div>
        <div class="example-target-ref-row" id="example-target-ref-row"></div>
        <div id="method-cards-container"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <span class="footer-copy">&copy; <span id="year"></span> <a href="https://chicagohai.github.io/">ChicagoHAI</a> &middot; University of Chicago</span>
    </div>
  </footer>

  <script src="nav.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    let examplesData = null;
    let currentExample = 0;

    function getConfidenceLabel(confidence) {
      if (confidence > 0.8) return { label: 'High confidence', color: 'var(--success)' };
      if (confidence > 0.6) return { label: 'Moderate confidence', color: 'var(--success)' };
      if (confidence > 0.4) return { label: 'Unsure', color: 'var(--text-muted)' };
      if (confidence > 0.2) return { label: 'Moderate confidence', color: 'var(--error)' };
      return { label: 'High confidence', color: 'var(--error)' };
    }

    async function init() {
      const resp = await fetch('examples-data.json');
      examplesData = await resp.json();
      renderTabs();
      renderExample(0);
    }

    function renderTabs() {
      const tabsEl = document.getElementById('example-tabs');
      tabsEl.textContent = '';
      examplesData.examples.forEach(function(ex, i) {
        const btn = document.createElement('button');
        btn.className = 'example-tab' + (i === 0 ? ' active' : '');
        btn.textContent = ex.label;
        btn.addEventListener('click', function() { selectExample(i); });
        tabsEl.appendChild(btn);
      });
    }

    function selectExample(index) {
      currentExample = index;
      const tabs = document.querySelectorAll('.example-tab');
      tabs.forEach(function(tab, i) {
        tab.classList.toggle('active', i === index);
      });
      renderExample(index);
    }

    function renderExample(index) {
      const ex = examplesData.examples[index];
      renderInputs(ex);
      renderMethodCards(ex);
    }

    function makeInputBlock(labelText, bodyText) {
      var wrapper = document.createElement('div');
      wrapper.className = 'example-input';
      var label = document.createElement('span');
      label.className = 'example-input-label';
      label.textContent = labelText;
      var text = document.createElement('div');
      text.className = 'example-input-text';
      text.textContent = bodyText;
      wrapper.appendChild(label);
      wrapper.appendChild(text);
      return wrapper;
    }

    function renderInputs(ex) {
      // Input in its own container
      var solo = document.getElementById('example-input-solo');
      solo.textContent = '';
      solo.appendChild(makeInputBlock('Input', ex.input));

      // Target and Reference side by side in a separate container
      var row = document.getElementById('example-target-ref-row');
      row.textContent = '';
      row.appendChild(makeInputBlock('Target', ex.target));
      if (ex.reference) {
        row.appendChild(makeInputBlock('Reference', ex.reference));
      }
    }

    function makeLabelGroup(text) {
      var group = document.createElement('div');
      group.className = 'method-cards-label-group';
      var label = document.createElement('span');
      label.className = 'method-cards-label-text';
      label.textContent = text;
      var line = document.createElement('div');
      line.className = 'method-cards-label-line';
      group.appendChild(label);
      group.appendChild(line);
      return group;
    }

    function makeCardGroup(labelText, pipelineKeys, ex) {
      var group = document.createElement('div');
      group.className = 'method-cards-group';
      group.appendChild(makeLabelGroup(labelText));
      var cards = document.createElement('div');
      cards.className = 'method-cards';
      pipelineKeys.forEach(function(key) {
        var p = ex.pipelines[key];
        if (!p) return;
        cards.appendChild(renderCard(p, key));
      });
      group.appendChild(cards);
      return group;
    }

    function renderMethodCards(ex) {
      var container = document.getElementById('method-cards-container');
      container.textContent = '';

      var wrapper = document.createElement('div');
      wrapper.className = 'method-cards-row';

      // Ground Truth group (first)
      if (ex.pipelines.ground_truth) {
        wrapper.appendChild(makeCardGroup('Ground Truth', ['ground_truth'], ex));
      }

      // Reference-Free group
      wrapper.appendChild(makeCardGroup('Reference-Free', ['direct', 'contrastive'], ex));

      // Uses Reference group
      wrapper.appendChild(makeCardGroup('Uses Reference', ['direct_ref', 'contrastive_ref'], ex));

      container.appendChild(wrapper);
    }

    function renderCard(pipeline, pipelineKey) {
      var card = document.createElement('div');
      card.className = 'method-card';

      // Header
      var header = document.createElement('div');
      header.className = 'method-card-header';

      var headerTop = document.createElement('div');
      headerTop.className = 'method-card-header-top';

      var name = document.createElement('h3');
      name.className = 'method-card-name';
      name.textContent = pipeline.name;

      var desc = document.createElement('p');
      desc.className = 'method-card-description';
      desc.textContent = pipeline.description;

      header.appendChild(headerTop);
      header.appendChild(name);
      header.appendChild(desc);

      // Body
      var body = document.createElement('div');
      body.className = 'method-card-body';

      // Score
      var score = pipeline.score;
      var scoreBox = document.createElement('div');
      scoreBox.className = 'method-card-score';

      var scoreLabel = document.createElement('span');
      scoreLabel.className = 'method-card-score-label';
      scoreLabel.textContent = 'Score';

      var scoreRight = document.createElement('div');
      scoreRight.className = 'method-card-score-right';

      var scoreValue = document.createElement('span');
      scoreValue.className = 'method-card-score-value';
      scoreValue.textContent = score.passed + '/' + score.total;

      scoreRight.appendChild(scoreValue);

      if (score.primary_metric !== 'pass') {
        var scoreMetric = document.createElement('span');
        scoreMetric.className = 'method-card-score-metric';
        scoreMetric.textContent = score.primary_metric + ': ' + score.percentage.toFixed(1) + '%';
        scoreRight.appendChild(scoreMetric);
      }

      scoreBox.appendChild(scoreLabel);
      scoreBox.appendChild(scoreRight);
      body.appendChild(scoreBox);

      // Divider
      var divider = document.createElement('hr');
      divider.className = 'method-card-divider';
      body.appendChild(divider);

      // Checklist header
      var clHeader = document.createElement('div');
      clHeader.className = 'checklist-header';
      clHeader.textContent = 'Checklist (' + pipeline.items.length + ' items)';
      body.appendChild(clHeader);

      // Checklist items
      var ul = document.createElement('ul');
      ul.className = 'checklist-items';

      pipeline.items.forEach(function(item) {
        ul.appendChild(renderChecklistItem(item, pipelineKey));
      });

      body.appendChild(ul);

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    function renderChecklistItem(item, pipelineKey) {
      var li = document.createElement('li');
      li.className = 'checklist-item';

      // Indicator
      var indicator = document.createElement('span');
      var status = item.passed === true ? 'pass' : (item.passed === false ? 'fail' : 'neutral');
      indicator.className = 'checklist-indicator ' + status;
      if (status === 'pass') {
        indicator.textContent = '\u2713';
      } else if (status === 'fail') {
        indicator.textContent = '\u2717';
      } else {
        indicator.textContent = '\u00A0';
      }

      // Content
      var content = document.createElement('div');
      content.className = 'checklist-item-content';

      var question = document.createElement('div');
      question.className = 'checklist-question';
      question.textContent = item.question;
      content.appendChild(question);

      if (item.reasoning) {
        var reasoning = document.createElement('div');
        reasoning.className = 'checklist-reasoning';
        reasoning.textContent = item.reasoning;
        content.appendChild(reasoning);
      }

      var showWeight = item.weight != null && pipelineKey !== 'ground_truth';
      var hasMeta = showWeight || (item.confidence != null);
      if (hasMeta) {
        var metaLine = document.createElement('div');
        metaLine.className = 'checklist-meta';

        if (showWeight) {
          var weight = document.createElement('span');
          weight.className = 'checklist-weight';
          weight.textContent = 'w=' + item.weight;
          metaLine.appendChild(weight);
        }

        if (item.confidence != null) {
          var conf = getConfidenceLabel(item.confidence);
          var confSpan = document.createElement('span');
          confSpan.className = 'checklist-confidence';
          confSpan.style.color = conf.color;
          confSpan.textContent = conf.label;
          metaLine.appendChild(confSpan);
        }

        content.appendChild(metaLine);
      }

      li.appendChild(indicator);
      li.appendChild(content);
      return li;
    }

    init();
  </script>
</body>
</html>
